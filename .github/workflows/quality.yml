name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  duplication:
    name: Duplication
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run duplication check
        run: sh ./scripts/run-duplication-check.sh

  api-quality:
    name: API Quality
    runs-on: ubuntu-latest
    needs:
      - duplication
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: api
          POSTGRES_USER: api_user
          POSTGRES_PASSWORD: api_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U api_user -d api"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Static analysis
        run: sh ./scripts/run-api-checks.sh static
      - name: Build
        run: sh ./scripts/run-api-checks.sh build
      - name: Migrate database
        run: sh ./scripts/run-api-checks.sh migrate
      - name: Test with coverage
        run: sh ./scripts/run-api-checks.sh coverage

  app-quality:
    name: App Quality
    runs-on: ubuntu-latest
    needs:
      - duplication
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Static analysis
        run: sh ../scripts/run-app-checks.sh static
      - name: Build
        run: sh ../scripts/run-app-checks.sh build
      - name: Unit tests
        run: sh ../scripts/run-app-checks.sh test
