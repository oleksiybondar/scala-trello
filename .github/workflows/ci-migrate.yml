name: DB Migrate

on:
  workflow_run:
    workflows:
      - Build
    types:
      - completed

jobs:
  api-migrate:
    name: API DB Migrate
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: api
          POSTGRES_USER: api_user
          POSTGRES_PASSWORD: api_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U api_user -d api"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Migrate database
        run: sh ./scripts/run-api-checks.sh migrate
