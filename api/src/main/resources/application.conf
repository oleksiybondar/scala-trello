http {
  host = "0.0.0.0"
  host = ${?API_HTTP_HOST}
  port = 8080
  port = ${?API_HTTP_PORT}
}

database {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    url = "jdbc:postgresql://localhost:5432/api"
    url = ${?API_DB_URL}
    user = "api_user"
    user = ${?API_DB_USER}
    password = "api_password"
    password = ${?API_DB_PASSWORD}
    driver = "org.postgresql.Driver"
    keep-alive-connection = true
  }
}

auth {
  jwt-secret = "development-jwt-secret"
  jwt-secret = ${?API_JWT_SECRET}
  access-token-ttl-seconds = 900
  session-ttl-days = 30
}

password {
  pepper = "development-password-pepper"
  pepper = ${?API_PASSWORD_PEPPER}
  history-size = 5
  strength {
    min-length = 8
    require-digit = false
    require-special-char = false
  }
}
