services:
  postgres:
    image: postgres:16
    container_name: api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: api
      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: api_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: