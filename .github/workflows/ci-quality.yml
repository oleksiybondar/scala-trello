name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  duplication:
    name: Duplication
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run duplication check
        run: sh ./scripts/run-duplication-check.sh

  api-static:
    name: API Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Static analysis
        run: sh ./scripts/run-api-checks.sh static

  app-static:
    name: App Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Static analysis
        run: sh ../scripts/run-app-checks.sh static
