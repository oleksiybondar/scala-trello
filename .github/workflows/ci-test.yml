name: Test

on:
  workflow_run:
    workflows:
      - Build
      - DB Migrate
    types:
      - completed

jobs:
  app-test:
    name: App Test
    if: ${{ github.event.workflow_run.name == 'Build' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: sh ../scripts/run-app-checks.sh test

  api-test:
    name: API Test
    if: ${{ github.event.workflow_run.name == 'DB Migrate' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: api
          POSTGRES_USER: api_user
          POSTGRES_PASSWORD: api_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U api_user -d api"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Migrate database
        run: sh ./scripts/run-api-checks.sh migrate
      - name: Test with coverage
        run: sh ./scripts/run-api-checks.sh coverage
